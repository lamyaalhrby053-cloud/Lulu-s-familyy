<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lulu's Family</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- بالونات بالأعلى -->
    <div class="balloons">
        🎈 🎈 🎈 🎈 🎈
    </div>

    <!-- أشرطة ملونة -->
    <div class="stripes">
        <div class="stripe red"></div>
        <div class="stripe yellow"></div>
        <div class="stripe blue"></div>
        <div class="stripe green"></div>
        <div class="stripe purple"></div>
    </div>

    <header>
        <h1>🌸 Lulu's Family 🌸</h1>
    </header>

    <main>
        <!-- مربع رئيسي للأسماء -->
        <div class="name-box">
            <h2 id="giver-name">أحمد</h2>
            <p id="receiver-name">يهدى لـ فاطمة</p>
        </div>

        <!-- مربع اقتراحات الهدايا -->
        <div class="gift-suggestions">
            <h3>اقتراحات الهدايا:</h3>
            <ul id="gift-list">
                <li>كتاب</li>
                <li>شوكولاتة</li>
                <li>زهرة</li>
            </ul>
        </div>

        <!-- مؤقت العيد -->
        <div class="countdown">
            <h3>تبقى للعيد:</h3>
            <p id="days-left">10 أيام</p>
        </div>
    </main>

    <!-- عبارة أسفل الموقع -->
    <footer>
        <p>ولا يمانع من هديه أخرى لـصاحبه الجُهد لولو 💖</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
