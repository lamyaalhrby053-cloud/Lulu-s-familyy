<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عائلة لولو - فعالية الهدايا</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body { margin:0; font-family:'Cairo', sans-serif; background: linear-gradient(135deg, #ffc0cb, #ffb6c1, #ff69b4); text-align:center; overflow-x:hidden; min-height:100vh; position:relative; }
.page { height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column; position:relative; overflow:hidden; }
.box { background:rgba(255,255,255,0.85); backdrop-filter:blur(15px); padding:30px; border-radius:25px; width:85%; max-width:400px; box-shadow:0 10px 25px rgba(0,0,0,0.3); transition:0.3s all ease; z-index:10; position:absolute; }
button { margin-top:20px; padding:10px 20px; border:none; border-radius:10px; background:#ff69b4; color:white; font-size:16px; cursor:pointer; font-family:'Cairo'; font-weight:bold; transition:0.3s; }
button:hover { transform:scale(1.05); background:#ff1493;}
button:active { transform:scale(0.95); }
input, textarea { margin-top:15px; padding:10px; border-radius:8px; border:1px solid pink; width:80%; text-align:center; font-size:16px; font-family:'Cairo';}
.confetti-piece { position:absolute; width:10px; height:10px; z-index:999; }

.flying { position:absolute; font-size:24px; animation-name:fallZigZag; animation-timing-function:linear; animation-iteration-count:infinite; pointer-events:none; z-index:1; }
@keyframes fallZigZag {
0%{transform:translate(0,-50px);}
25%{transform:translate(20px,25vh);}
50%{transform:translate(-15px,50vh);}
75%{transform:translate(15px,75vh);}
100%{transform:translate(0,110vh);}
}
</style>
</head>
<body>

<div id="emojiContainer"></div>

<div id="page1" class="page">
<div id="welcomeBox" class="box">
<h2>❤️ كل عام وانتم بخير ❤️</h2>
<button onclick="moveBox()">اضغط هنا</button>
</div>
</div>

<div id="page2" class="page" style="display:none">
<div class="box">
<p>كما أوصانا النبي ﷺ (تهادوا تحابوا)</p>
<p>ولتجديد ذكرى الفعالية ولإشباع فضولك حيال من ستهدي ضع سنة ميلادك</p>
<input id="codeInput" type="password" placeholder="ادخل سنة ميلادك">
<br>
<button onclick="checkCode()">دخول</button>
<p id="msg"></p>
</div>
</div>

<div id="page3" class="page" style="display:none">
<div class="box" style="position:relative;">
<h3 id="giver" style="margin-bottom:10px; font-size:24px; color:#d63384;"></h3>
<p>انت ستهدي</p>
<h2 id="receiver" style="font-size:32px; color:#ff1493;"></h2>

<textarea id="myWishes" placeholder="اكتب الهدايا التي ترغب بها"></textarea>

<div style="margin-top:15px">
⏳ تبقى للعيد:
<p>
<span id="days"></span>d :
<span id="hours"></span>h :
<span id="minutes"></span>m :
<span id="seconds"></span>s
</p>
</div>

<p style="font-size:12px;">
ولا يمانع من إهداء صاحبه الموقع على إجتهادها الشخصي 🥰
</p>

<button onclick="logout()">خروج</button>
</div>
</div>

<div id="confettiContainer"></div>

<script>

const emojiContainer=document.getElementById("emojiContainer");
const emojis=["🎈","🎉","💖","✨","🎊"];
for(let i=0;i<30;i++){
const e=document.createElement("div");
e.className="flying";
e.innerText=emojis[Math.floor(Math.random()*emojis.length)];
e.style.left=Math.random()*window.innerWidth+"px";
e.style.animationDuration=(4+Math.random()*6)+"s";
emojiContainer.appendChild(e);
}

let clicks=0;
function moveBox(){
const box=document.getElementById("welcomeBox");
clicks++;

if(clicks==4){
box.innerHTML=`<h2>خلاص أمزح 😆</h2>
<button onclick="goNext()">آخر مرة اضغط هنا</button>`;
box.style.position="relative";
return;
}

const maxX=window.innerWidth-box.offsetWidth-20;
const maxY=window.innerHeight-box.offsetHeight-20;

box.style.position="absolute";
box.style.left=Math.random()*maxX+"px";
box.style.top=Math.random()*maxY+"px";
}

function goNext(){
document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="flex";
}

const users={
"2007":"راكان",
"1995":"محمد",
"1993":"رايد",
"1997":"نجد",
"2001":"غاده",
"1425":"لولو",
"1968":"ماما فوفه"
};

let currentUser="";
let currentReceiver="";

function checkCode(){
const input=document.getElementById("codeInput").value;
const msg=document.getElementById("msg");
const person=users[input];

if(person){
currentUser=person;

const names=Object.values(users);
let receivers=[...names].sort(()=>Math.random()-0.5);

for(let i=0;i<names.length;i++){
if(names[i]===receivers[i]){
receivers=[...names].sort(()=>Math.random()-0.5);
i=-1;
}
}

const draw={};
names.forEach((name,i)=>draw[name]=receivers[i]);

currentReceiver=draw[currentUser];

document.getElementById("page2").style.display="none";
document.getElementById("page3").style.display="flex";

document.getElementById("giver").innerText=currentUser;
document.getElementById("receiver").innerText=currentReceiver;

createConfetti();

}else{
msg.innerText="الرمز غير صحيح ❌";
msg.style.color="red";
}
}

function logout(){
document.getElementById("page3").style.display="none";
document.getElementById("page2").style.display="flex";
document.getElementById("codeInput").value="";
}

const eidDate=new Date("March 20, 2026 00:00:00").getTime();

setInterval(()=>{
const now=new Date().getTime();
const distance=eidDate-now;

let days=Math.floor(distance/(1000*60*60*24));
let hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
let minutes=Math.floor((distance%(1000*60*60))/(1000*60));
let seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerText=days;
document.getElementById("hours").innerText=hours;
document.getElementById("minutes").innerText=minutes;
document.getElementById("seconds").innerText=seconds;

},1000);

function createConfetti(){
const container=document.getElementById("confettiContainer");
container.innerHTML="";

for(let i=0;i<40;i++){
const c=document.createElement("div");
c.className="confetti-piece";
c.style.backgroundColor=`hsl(${Math.random()*360},80%,60%)`;
c.style.left=Math.random()*window.innerWidth+"px";
c.style.top="-10px";

container.appendChild(c);

let speed=2+Math.random()*3;

(function animate(el,s){
let top=0;
function frame(){
top+=s;
el.style.top=top+"px";
if(top<window.innerHeight)requestAnimationFrame(frame);
else el.remove();
}
frame();
})(c,speed);

}
}

</script>

</body>
</html>
