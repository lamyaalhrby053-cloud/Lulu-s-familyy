<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lulu Family</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ffc0cb;
text-align:center;
overflow:hidden;
}

.page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.box{
background:rgba(255,255,255,0.7);
padding:30px;
border-radius:20px;
width:80%;
max-width:350px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
position:absolute;
transition:0.4s;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff69b4;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="page1" class="page">

<div id="welcomeBox" class="box">

<h2>❤️ كل عام وانتم بخير ❤️</h2>

<button onclick="moveBox()">اضغط هنا</button>

</div>

</div>


<script>

let clicks=0;

function moveBox(){

const box=document.getElementById("welcomeBox");

clicks++;

if(clicks>=5){

alert("خلاص امزح هذي اخر مرة 😆");

return;

}

const x=(Math.random()*400)-200;
const y=(Math.random()*400)-200;

box.style.transform=`translate(${x}px , ${y}px)`;

}

</script>

</body>
</html>
